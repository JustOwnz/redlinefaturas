<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedLine Performance - Faturas</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Arial;background:#0b1020;color:#e5e7eb}
.header{
  padding:10px 20px;
  background:linear-gradient(180deg,#111827,#020617);
  border-bottom:1px solid rgba(255,255,255,.12);
  display:flex;
  align-items:center;
  gap:8px
}
.container{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  padding:10px;
  max-width:1100px;
  margin:auto
}
.card{
  background:linear-gradient(180deg, rgba(31,41,55,.75), rgba(17,24,39,.65));
  border-radius:12px;
  padding:10px;
  border:1px solid rgba(255,255,255,.12)
}
.section-title{font-weight:900;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-title::after{content:"";flex:1;height:1px;background:rgba(255,255,255,.2)}
input{
  width:100%;
  padding:6px;
  border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:white;margin-top:4px;text-align:center}
.switch {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}

.switch input {display:none;}

.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: #1f2937;
  border-radius: 20px;
  transition: .2s;
}

.slider:before {
  content: "";
  position: absolute;
  height: 14px;
  width: 14px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: .2s;
}

.switch input:checked + .slider {
  background: #22c55e;
}

.switch input:checked + .slider:before {
  transform: translateX(16px);
}


/* remover setas dos inputs number */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{
  -webkit-appearance: none;
  margin: 0;
}
input[type=number]{
  -moz-appearance: textfield;
}
.svc-table input[type="number"]{width:70px;padding:6px;margin:0 auto;display:block}
.svc-table{table-layout:fixed;width:100%;border-collapse:collapse;font-size:13px}
.svc-table td,.svc-table th{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.svc-table th{
  text-align:left;
  font-size:11px;
  color:#9ca3af;
  padding-bottom:4px
}
.svc-table td{
  padding:6px 0;
  border-bottom:1px dashed rgba(255,255,255,.08)
}
.svc-table td:nth-child(2),.svc-table td:nth-child(4){text-align:right}
.svc-table td:nth-child(3){text-align:center}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;justify-content:center;margin-top:12px;max-width:700px;margin-left:auto;margin-right:auto}
.info-box{
  background:rgba(0,0,0,.3);
  padding:6px;
  border-radius:8px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08)
}
.info-box b{
  display:block;
  font-size:15px;
  color:#22c55e;
  transition:.25s
}
.info-box{
  backdrop-filter: blur(4px);
}
.info-box{
  font-size:12px;
}
.info-box.updated b{transform:scale(1.15);color:#4ade80}
.custom-select{position:relative}
.custom-select-trigger{padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:#020617;cursor:pointer;text-align:center}
.custom-options{
  position:absolute;
  top:110%;
  width:100%;
  background:#020617;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  display:none;
  z-index:9999;
}

.custom-select{
  position:relative;
  z-index:10;
}
.custom-option{padding:10px;cursor:pointer}
.custom-option:hover{background:#1e293b}
.custom-select.open .custom-options{display:block}

.crafts-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px
}
.craft-card{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px}
.craft-title{font-weight:700}
.craft-body{font-size:12px;color:#9ca3af;margin-bottom:8px}
.craft-row{display:flex;justify-content:space-between;align-items:center}

.material-card{
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  padding:8px;
  margin-bottom:6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:center;
  text-align:center;
}
.material-row{display:flex;align-items:center;gap:6px;font-size:12px}
.material-row img{width:18px;height:18px}
.mat-ferro{color:#facc15}
.mat-tecido{color:#38bdf8}

.subtotal{display:flex;justify-content:space-between;margin-top:10px;font-weight:700}
.totals{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  width:100%;
  margin:0;
}

.totals span{
  font-size:14px;
}

.totals span:nth-child(2n){
  text-align:right;
  font-weight:600;
}

.totals hr{
  margin:10px 0;
}

#totalFinal{
  font-size:18px;
  color:#22c55e;
}

.totals span{
  font-size:13px;
}

.totals span:nth-child(2n){
  text-align:right;
  font-weight:600;
}

.totals hr{
  margin:8px 0;
}

#totalFinal{
  font-size:18px;
  color:#22c55e;
}

.totals span{
  font-size:14px;
}

.totals span:nth-child(2n){
  text-align:right;
  font-weight:600;
}

.totals hr{
  margin:10px 0;
}

#totalFinal{
  font-size:18px;
  color:#22c55e;
}
button{border:none;border-radius:12px;padding:12px 18px;cursor:pointer;font-weight:700;letter-spacing:.2px;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}

/* estilo premium botões */
.btn-green{
  background:linear-gradient(180deg,#22c55e,#16a34a);
  color:#052e16;
  box-shadow:0 6px 14px rgba(34,197,94,.35);
}

.btn-green:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 20px rgba(34,197,94,.5);
}

.btn-red{
  background:linear-gradient(180deg,#ef4444,#dc2626);
  color:#fff;
  box-shadow:0 6px 14px rgba(239,68,68,.35);
}

.btn-red:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 20px rgba(239,68,68,.5);
}

/* spacing entre botões */
.card button+button{margin-left:10px}
.btn-green{background:#22c55e}
.btn-red{background:#ef4444}
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index:99999;
}.modal-box{background:#020617;padding:20px;border-radius:14px}
textarea{
  width:100%;
  padding:6px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:white;
  margin-top:4px;
  resize:none;
  }
  .svc-table input,
#servicesGrid input{
  width:55px;
  padding:4px;
  font-size:12px;
}
</style>
</head>
<body>

<br>
<div style="display:flex;gap:12px;margin-top:10px">

`;

col2.innerHTML = headerHTML;

function calc(){
let craftHTML='';
crafts.forEach((c,i)=>{
const q=Number(document.getElementById('craftQ'+i)?.value)||0;
if(q>0){
craftHTML+=`<div class="material-card">
<div style="font-weight:600">${c.name}</div>
${c.materials.map(m=>{
const total=m.qty*q;
const cls=m.name.toLowerCase()==='ferro'?'mat-ferro':'mat-tecido';
return `<div class="material-row ${cls}">
<img src="${m.icon}">
<span>${total}x ${m.name}</span>
</div>`;
}).join('')}
</div>`;
}
});

let el = document.getElementById('q'+i);

  q = el.checked ? 1 : 0;
} else {
  q = Number(el.value) || 0;
}
let t=q*s.price;
document.getElementById('t'+i).innerText=formatEuro(t);
total+=t;
});

let descontoPct=Number(document.getElementById('descontoInput').value)||0;

let totalBaseFinal = subtotalBase - desc;

// serviços são adicionados depois

animateValue('info35',acrescimo);
animateValue('infoDesc',desc);
animateValue('infoFinal',final);

document.getElementById('totalServ').innerText=formatEuro(total);

const tServEl = document.getElementById('tServ');
const tDescEl = document.getElementById('tDesc');

if(t35El) t35El.innerText = formatEuro(acrescimo);
if(tServEl) tServEl.innerText = formatEuro(total);
if(tDescEl) tDescEl.innerText = '- ' + formatEuro(desc);

document.getElementById('totalFinal').innerText=formatEuro(final);
}
setInterval(calc,300);

const descontoPct=Number(document.getElementById('descontoInput').value)||0;

let lista='';
services.forEach((s,i)=>{
let el = document.getElementById('q'+i);
let q = 0;

if(el.type === 'checkbox'){
  q = el.checked ? 1 : 0;
} else {
  q = Number(el.value) || 0;
}
if(q>0){
let t=q*s.price;
totalServ+=t;
lista+=`<div style="display:flex;justify-content:space-between"><span>${s.name} x${q}</span><span>${formatEuro(t)}</span></div>`;
}

if(!lista) lista='<i>Sem serviços</i>';

let acrescimo=base*0.35;

// calcular base primeiro
let subtotalBase = base + acrescimo;
let descontoValor = subtotalBase * (descontoPct/100);
let totalBaseFinal = subtotalBase - descontoValor;

// depois adicionar serviços
let final = totalBaseFinal + totalServ;

document.getElementById('previewData').innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:10px">

					">📋</button>
		</div>
      <span style="color:#9ca3af">Valor da fatura</span><b>${formatEuro(base)}</b>
      <span style="color:#9ca3af">+35%</span><b>${formatEuro(acrescimo)}</b>
	  ${descricao ? `
<span style="color:#9ca3af">Descrição</span>
<b style="
  grid-column:1 / -1;
  text-align:left;

">
  ${descricao}
</b>
</b>
` : ''}
    </div>

    <div style="margin-top:14px;border-top:1px dashed rgba(255,255,255,.12);padding-top:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <b>Serviços</b>
        <span style="font-size:11px;background:#052e16;color:#4ade80;padding:3px 8px;border-radius:999px">itens</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:13px;color:#cbd5f5">
        ${lista}
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL (TOTALS) -->

const lastVals={};
function animateValue(id,value){
const el=document.getElementById(id);
const box=el.parentElement;
if(lastVals[id]===value){el.innerText=formatEuro(value);return}
lastVals[id]=value;
let startTime=null;const duration=300;
function step(t){if(!startTime)startTime=t;let p=Math.min((t-startTime)/duration,1);let val=Math.floor(p*value);el.innerText=formatEuro(val);if(p<1)requestAnimationFrame(step);else el.innerText=formatEuro(value)}
requestAnimationFrame(step);
box.classList.add('updated');
setTimeout(()=>box.classList.remove('updated'),300);
}

function formatEuro(v){return Number(v||0).toLocaleString('pt-PT')+' €'}
